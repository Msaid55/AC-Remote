<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="index.js"> </script>
</head>
<body>
     <main style="display: flex; align-items: center; justify-content: center; flex-direction: column; margin-top: 10rem; gap: 20px;">
    
     <p style="display:none;">Status: <span id="fanStatus">OFF</span></p>
    <p style="display:none;">Temperature: <span id="acTemp">24</span> °C</p>
    <p style="display:none;">Fan Speed: <span id="fanSpeed">1</span></p>

    <button style="width: 100px; height: 50px; background-color: darkcyan;" onclick="togglePower()">On / Off</button>
    <button style="width: 100px; height: 50px; background-color: darkcyan;" onclick="increaseTemp()">+</button>
    <button style="width: 100px; height: 50px; background-color: darkcyan;" onclick="decreaseTemp()">-</button>
    <button style="width: 100px; height: 50px; background-color: darkcyan;" onclick="changeFanSpeed()">Change Fan Speed</button>

  </main>
</body>
</html>
